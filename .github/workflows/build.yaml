name: Release Build

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build & Upload (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt (Windows)
        if: runner.os == 'Windows'
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.6.3"
          host: "windows"
          arch: "win64_msvc2019_64"
          cache: true

      - name: Install Qt (macOS)
        if: runner.os == 'macOS'
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.6.3"
          host: "mac"
          arch: "clang_64"
          cache: true

      - name: Set up MSVC dev environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: cmake --build build --config Release
       
      - name: Install & Automagic Deploy (Windows)
        if: runner.os == 'Windows'
        run: cmake --install build --config Release --prefix install

      - name: Zip Release (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist
          # Wir zippen einfach den gesamten Inhalt des bin-Ordners
          Compress-Archive -Path "install\bin\*" -DestinationPath dist\PathfindingVisualizer-windows.zip


      - name: Configure (macOS)
        if: runner.os == 'macOS'
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: cmake --build build

      - name: Install & Automagic Deploy (macOS)
        if: runner.os == 'macOS'
        run: cmake --install build --prefix install

      - name: Zip Release (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist
          # Wir zippen die fertige, deployte macOS App
          ditto -c -k --sequesterRsrc --keepParent "install/bin/app.app" "dist/PathfindingVisualizer-macos.zip"


      - name: Upload artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*