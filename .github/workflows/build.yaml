on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build & Upload (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ----- Install Qt -----
      - name: Install Qt (Windows)
        if: runner.os == 'Windows'
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.6.3"
          host: "windows"
          arch: "win64_msvc2019_64"
          cache: true

      - name: Install Qt (macOS)
        if: runner.os == 'macOS'
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.6.3"
          host: "mac"
          arch: "clang_64"
          cache: true

      # ----- Windows: MSVC toolchain (matches win64_msvc2019_64) -----
      - name: Set up MSVC dev environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure (Windows - MSVC)
        if: runner.os == 'Windows'
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}\install"

      - name: Build (Windows - MSVC)
        if: runner.os == 'Windows'
        run: cmake --build build --config Release
      
      - name: Install (Windows)
        if: runner.os == 'Windows'
        run: cmake --install build --config Release

      # ----- macOS: Ninja -----
      - name: Configure (macOS - Ninja)
        if: runner.os == 'macOS'
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build (macOS - Ninja)
        if: runner.os == 'macOS'
        run: cmake --build build

      # ----- Deploy Qt runtimes -----
      - name: Deploy Qt runtime (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $exe = "$PWD\install\bin\app.exe"
          if (!(Test-Path $exe)) { throw "Expected $exe but it doesn't exist." }

          # Deploy Qt DLLs + plugins + QML imports
          windeployqt --release --qmldir "$PWD\ui" $exe

          # Stage and zip the install tree
          New-Item -ItemType Directory -Force dist | Out-Null
          Compress-Archive -Path "$PWD\install\*" -DestinationPath dist\PathfindingVisualizer-windows.zip

      - name: Deploy Qt runtime (macOS)
        if: runner.os == 'macOS'
        run: |
          APP_PATH="$GITHUB_WORKSPACE/build/app.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "Expected $APP_PATH but it doesn't exist."
            ls -la build || true
            exit 1
          fi
          macdeployqt "$APP_PATH" -qmldir="$GITHUB_WORKSPACE/ui"
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "dist/PathfindingVisualizer-macos.zip"

      # ----- Upload to the GitHub Release -----
      - name: Upload artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*