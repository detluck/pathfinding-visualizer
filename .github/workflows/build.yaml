name: Release Build

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build & Upload (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ==========================================
      # 1. Qt INSTALL
      # ==========================================
      - name: Install Qt (Windows)
        if: runner.os == 'Windows'
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.6.3"
          host: "windows"
          arch: "win64_msvc2019_64"
          cache: true

      - name: Install Qt (macOS)
        if: runner.os == 'macOS'
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.6.3"
          host: "mac"
          arch: "clang_64"
          cache: true

      # ==========================================
      # 2. BUILD & DEPLOY (WINDOWS)
      # ==========================================
      - name: Set up MSVC dev environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: cmake --build build --config Release
       
      - name: Install & Automagic Deploy (Windows)
        if: runner.os == 'Windows'
        run: cmake --install build --config Release --prefix "${{ github.workspace }}/install"

      - name: Zip Release (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir -p dist
          7z a -tzip dist/PathfindingVisualizer-windows.zip .\install\*

      # ==========================================
      # 3. BUILD & DEPLOY (macOS)
      # ==========================================
      - name: Configure (macOS)
        if: runner.os == 'macOS'
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: cmake --build build

      - name: Install & Automagic Deploy (macOS)
        if: runner.os == 'macOS'
        run: cmake --install build --prefix "${{ github.workspace }}/install"

      - name: Zip Release (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent "${{ github.workspace }}/install/Pathfinder.app" "dist/PathfindingVisualizer-macos.zip"

      # ==========================================
      # 4. GITHUB RELEASE UPLOAD
      # ==========================================
      - name: Upload artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*