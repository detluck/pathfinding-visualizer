on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build & Upload (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ----- Install Qt -----
      - name: Install Qt (Windows)
        if: runner.os == 'Windows'
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.6.3"
          host: "windows"
          arch: "win64_msvc2019_64"
          cache: true

      - name: Install Qt (macOS)
        if: runner.os == 'macOS'
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.6.3"
          host: "mac"
          arch: "clang_64"
          cache: true

      # ----- Build with Ninja -----
      - name: Configure (Ninja)
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build (Ninja)
        run: cmake --build build

      # ----- Deploy Qt runtimes -----
      - name: Deploy Qt runtime (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $exe = "$PWD\build\app.exe"
          if (!(Test-Path $exe)) { throw "Expected $exe but it doesn't exist." }

          # Bundle Qt DLLs + plugins + QML imports
          windeployqt --release --qmldir "$PWD\ui" $exe

          # Stage distributable folder
          New-Item -ItemType Directory -Force dist\PathfindingVisualizer-win | Out-Null
          Copy-Item "$PWD\build\*" "dist\PathfindingVisualizer-win" -Recurse -Force

          # Zip it
          Compress-Archive -Path dist\PathfindingVisualizer-win\* -DestinationPath dist\PathfindingVisualizer-windows.zip

      - name: Deploy Qt runtime (macOS)
        if: runner.os == 'macOS'
        run: |
          APP_PATH="$GITHUB_WORKSPACE/build/app.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "Expected $APP_PATH but it doesn't exist."
            ls -la build || true
            exit 1
          fi

          macdeployqt "$APP_PATH" -qmldir="$GITHUB_WORKSPACE/ui"

          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "dist/PathfindingVisualizer-macos.zip"

      # ----- Upload to the GitHub Release -----
      - name: Upload artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*